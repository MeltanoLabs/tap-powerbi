send_anonymous_usage_stats: true
project_id: "tap-powerbi"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-powerbi"
    namespace: "tap_powerbi"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings:
    - name: tenant_id
      kind: string
      label: Tenant ID
      description: >-
        Azure AD tenant ID. Required for the service-principal
        (client_credentials) auth flow.
      sensitive: true

    - name: client_id
      kind: string
      label: Client ID
      description: Azure AD application (client) ID.
      sensitive: true

    - name: client_secret
      kind: password
      label: Client Secret
      description: >-
        Azure AD application client secret. Required for service-principal
        and direct delegated-user auth; omit when using the Matatika OAuth
        proxy (the proxy holds the secret).
      sensitive: true

    - name: refresh_token
      kind: password
      label: Refresh Token
      description: >-
        OAuth refresh token. Provide instead of tenant_id to use the
        delegated-user auth flow.
      sensitive: true

    - name: oauth_credentials.refresh_proxy_url
      kind: string
      label: OAuth Refresh Proxy URL
      description: >-
        Matatika OAuth proxy URL used to refresh access tokens. When set,
        the tap POSTs the refresh token to this URL and the proxy returns a
        fresh access token. Used by the catalog "Connect with Microsoft"
        button.

    - name: oauth_credentials.refresh_proxy_url_auth
      kind: password
      label: OAuth Refresh Proxy Authorization
      description: >-
        Authorization header value sent on the proxy refresh request
        (e.g. "Bearer <token>"). Optional.
      sensitive: true

    - name: workspace_ids
      kind: array
      label: Workspace IDs
      description: >-
        Optional list of Power BI workspace (group) IDs to restrict
        discovery to. Empty = all workspaces visible to the principal.

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: >-
        Earliest timestamp for incremental streams (e.g. dataset_refreshes).

    - name: api_url
      kind: string
      label: API URL
      value: https://api.powerbi.com/v1.0/myorg
      description: >-
        Power BI REST API base URL. Override for sovereign clouds
        (e.g. https://api.powerbigov.us/v1.0/myorg).

    - name: admin_mode
      kind: boolean
      label: Admin Mode
      value: false
      description: >-
        Use /admin/* routes for tenant-wide visibility. Requires
        Tenant.Read.All permission on the service principal. Enables
        admin-only fields (createdDateTime, modifiedBy, users, etc.)
        on groups/datasets/reports/dashboards/dataflows.

    settings_group_validation:
    - [tenant_id, client_id, client_secret]
    - [client_id, client_secret, refresh_token]
    - [oauth_credentials.refresh_proxy_url, refresh_token, client_id]

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
